main: org.data7.bYD_WORLD_UTRAL.BYD_WORLD_UTRAL
api-version: '1.21'

depend: [UltimateAdvancementAPI]
softdepend: ["PlaceholderAPI"]

commands:
  suicide:
    description: 🔪紫砂
    usage: /<command>
    aliases:
      - s
    permission: BYD_WORLD_UTRAL.suicide
